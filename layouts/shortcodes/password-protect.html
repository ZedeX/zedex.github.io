{{- /* 密码保护内容 */ -}}
{{- $password := .Get "password" | default "secret" -}}
{{- $id := printf "protected-%s" (md5 .Inner) -}}

<div class="password-protect" id="{{ $id }}-container">
  <div class="password-prompt">
    <input type="password" id="{{ $id }}-input" placeholder="输入密码查看内容">
    <button onclick="checkPassword('{{ $id }}', '{{ $password }}')">解锁</button>
  </div>
  <div class="password-content" id="{{ $id }}-content" style="display:none;">
    {{ .Inner | markdownify }}
  </div>
</div>

<script>
function checkPassword(id, correctPassword) {
  const input = document.getElementById(id + '-input');
  const content = document.getElementById(id + '-content');
  const prompt = document.getElementById(id + '-container').querySelector('.password-prompt');

  if (input.value === correctPassword) {
    prompt.style.display = 'none';
    content.style.display = 'block';
  } else {
    input.value = '';
    input.placeholder = '密码错误，请重试';
    input.style.borderColor = 'red';
  }
}
</script>

<style>
.password-protect {
  border: 1px solid #ddd;
  padding: 1rem;
  margin: 1rem 0;
}
.password-prompt input {
  padding: 0.5rem;
  margin-right: 0.5rem;
}
.password-prompt button {
  padding: 0.5rem 1rem;
  cursor: pointer;
}
</style>
